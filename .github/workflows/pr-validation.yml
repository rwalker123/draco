name: PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Comprehensive Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.13.1'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: draco-nodejs/frontend-next/.next/cache
          key: ${{ runner.os }}-nextjs-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-pnpm-

      - name: Security - Audit Dependencies
        run: pnpm audit --audit-level=critical

      - name: Security - Detect Secrets
        run: |
          pip install detect-secrets
          cp .secrets.baseline .secrets.baseline.bak
          detect-secrets scan --baseline .secrets.baseline --exclude-files 'pnpm-lock\.yaml'
          diff .secrets.baseline.bak .secrets.baseline

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        
      - name: Test Coverage Summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "Backend and frontend tests completed successfully ✅" >> $GITHUB_STEP_SUMMARY
          
      - name: Docker Build - Backend
        run: docker build -f draco-nodejs/backend/Dockerfile -t draco-backend .

      - name: Docker Verify - pg_dump version
        run: |
          PG_VERSION=$(docker run --rm draco-backend pg_dump --version)
          echo "pg_dump version: $PG_VERSION"
          echo "$PG_VERSION" | grep -q "17\." || (echo "Expected pg_dump 17.x" && exit 1)

      - name: Docker Verify - Backend health check
        run: |
          docker run -d --name draco-backend-test \
            -p 3001:3001 \
            -e PORT=3001 \
            -e NODE_ENV=production \
            -e JWT_SECRET=ci-test-secret \
            -e FRONTEND_URL=http://localhost:3000 \
            draco-backend
          for i in $(seq 1 15); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "503" ]; then
              echo "Health endpoint responded with HTTP $HTTP_CODE (503 expected without DB)"
              docker rm -f draco-backend-test
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 30s"
          docker logs draco-backend-test
          docker rm -f draco-backend-test
          exit 1

      - name: Validation Summary
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security checks passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Linting passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build completed successfully (includes type checking)" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker backend image built successfully" >> $GITHUB_STEP_SUMMARY
